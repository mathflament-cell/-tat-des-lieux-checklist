<html lang="fr">

<meta charset="UTF-8">

<title>Aide-mémoire EDL</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F5F0E8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
#app{display:flex;flex-direction:column;min-height:100vh;}
#bar{background:#F5F0E8;border-bottom:1.5px solid #D4C9B0;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
#bar h1{font-size:14px;font-weight:700;color:#1A2744;flex-shrink:0;}
#bc{display:flex;align-items:center;gap:4px;flex:1;flex-wrap:wrap;overflow:hidden;}
.bi{font-size:11px;color:#1A2744;background:#EAE5D8;border-radius:10px;padding:2px 8px;cursor:pointer;border:1px solid #C8BFA8;white-space:nowrap;}
.bi:hover{background:#DDD6C5;}
.bs{color:#A39A8C;font-size:10px;}
#bk{background:#1A2744;color:#F5F0E8;border:none;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;flex-shrink:0;}
#bk:disabled{opacity:.3;cursor:default;}
#src{padding:5px 10px;border-radius:7px;border:1px solid #C8BFA8;background:#FDFAF4;font-size:12px;color:#1A2744;width:150px;}
#content{flex:1;padding:14px;}
.lvl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#8B7355;margin-bottom:10px;}
.nodes{display:flex;flex-direction:column;gap:7px;}
.nd{display:flex;align-items:stretch;border-radius:10px;border:1.5px solid #C8BFA8;background:#FDFAF4;cursor:pointer;overflow:hidden;-webkit-tap-highlight-color:transparent;}
.nd:active{background:#EDE8DE;}
.nl{width:5px;flex-shrink:0;background:#C8BFA8;}
.nd.hc .nl{background:#1A2744;}
.nd.sr .nl{background:#C08A2E;}
.nb{flex:1;padding:11px 13px;}
.nm{font-size:14px;font-weight:600;color:#1A2744;line-height:1.3;}
.ns{font-size:11px;color:#6B6258;margin-top:3px;}
.na{display:flex;align-items:center;padding:0 13px;flex-shrink:0;}
.btn{width:28px;height:28px;border-radius:50%;border:1.5px solid #1A2744;background:transparent;color:#1A2744;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.nd.lf .btn{border-color:#C8BFA8;color:#8B7355;font-size:12px;font-weight:500;}
.dd{font-size:12px;color:#1A2744;padding:8px 13px 11px;line-height:1.5;border-top:1px solid #EAE5D8;background:#F8F5EE;}
.hint{text-align:center;padding:40px 20px;color:#8B7355;font-size:14px;}
</style>
</head>
<body>
<div id="app">
<div id="bar">
  <button id="bk" onclick="goBack()">← Retour</button>

</div>
<div id="content">

  <div class="nodes" id="nodes"></div>
</div>
</div>

let path=[],expanded=null,searchQ="";

function getNode(p){let n=T;for(const i of p)n=n.children[i];return n;}

function doSearch(q){searchQ=q.trim().toLowerCase();expanded=null;render();}

function searchAll(node,q,results=[],p=[]){
  if(node.label&&node.label.toLowerCase().includes(q))results.push({node,path:[...p]});
  if(node.children)node.children.forEach((c,i)=>searchAll(c,q,results,[...p,i]));
  return results;
}

function render(){
  const nodesEl=document.getElementById("nodes");
  const lvlEl=document.getElementById("lvl");
  const bk=document.getElementById("bk");
  const bc=document.getElementById("bc");
  bk.disabled=path.length===0&&!searchQ;
  bc.innerHTML="";

  if(!searchQ){
    const crumbs=[{label:"État des lieux",idx:null}];
    for(let i=0;i<path.length;i++){let n=T;for(let j=0;j<=i;j++)n=n.children[path[j]];crumbs.push({label:n.label,idx:i});}
    crumbs.forEach((c,ci)=>{
      if(ci>0){const s=document.createElement("span");s.className="bs";s.textContent="›";bc.appendChild(s);}
      const el=document.createElement("span");el.className="bi";el.textContent=c.label;
      el.onclick=()=>{path=c.idx===null?[]:path.slice(0,c.idx+1);expanded=null;render();};
      bc.appendChild(el);
    });
  }

  nodesEl.innerHTML="";

  if(searchQ){
    const results=searchAll(T,searchQ);
    lvlEl.textContent=results.length+" résultat"+(results.length>1?"s":"")+" pour \""+searchQ+"\"";
    if(!results.length){nodesEl.innerHTML='<div class="hint">Aucun terme trouvé.</div>';return;}
    results.forEach(({node,path:rp})=>{
      const hasChildren=node.children&&node.children.length>0;
      const div=document.createElement("div");
      div.className="nd"+(hasChildren?" hc":"");
      div.style.borderColor="#C08A2E";
      const nl=document.createElement("div");nl.className="nl";nl.style.background="#C08A2E";
      const nb=document.createElement("div");nb.className="nb";
      const nm=document.createElement("div");nm.className="nm";nm.textContent=node.label;
      nb.appendChild(nm);
      const bread=rp.slice(0,-1).map((_,i)=>{let n=T;for(let j=0;j<=i;j++)n=n.children[rp[j]];return n.label;}).join(" › ");
      if(bread){const ns=document.createElement("div");ns.className="ns";ns.textContent=bread;nb.appendChild(ns);}
      if(node.desc){const dd=document.createElement("div");dd.className="dd";dd.textContent=node.desc;nb.appendChild(dd);}
      const na=document.createElement("div");na.className="na";
      const btn=document.createElement("button");btn.className="btn";
      btn.textContent=hasChildren?"→":"i";
      btn.onclick=(e)=>{e.stopPropagation();if(hasChildren){searchQ="";document.getElementById("src").value="";path=[...rp];expanded=null;render();}};
      na.appendChild(btn);
      div.appendChild(nl);div.appendChild(nb);div.appendChild(na);
      div.onclick=()=>{if(hasChildren){searchQ="";document.getElementById("src").value="";path=[...rp];expanded=null;render();}};
      nodesEl.appendChild(div);
    });
    return;
  }

  const node=path.length?getNode(path):T;
  const children=node.children||[];
  if(path.length===0)lvlEl.textContent="Catégories principales";
  else{const n=getNode(path);lvlEl.textContent=n.label+(n.sub?" — "+n.sub:"");}
  if(!children.length){nodesEl.innerHTML='<div class="hint">Aucun sous-terme.</div>';return;}

  children.forEach((child,i)=>{
    const hasChildren=child.children&&child.children.length>0;
    const div=document.createElement("div");
    div.className="nd"+(hasChildren?" hc":" lf");
    const nl=document.createElement("div");nl.className="nl";
    const nb=document.createElement("div");nb.className="nb";
    const nm=document.createElement("div");nm.className="nm";nm.textContent=child.label;
    nb.appendChild(nm);
    if(child.sub){const ns=document.createElement("div");ns.className="ns";ns.textContent=child.sub;nb.appendChild(ns);}
    const na=document.createElement("div");na.className="na";
    const btn=document.createElement("button");btn.className="btn";
    const key=path.join(",")+","+i;
    if(hasChildren){
      btn.textContent="+";
      btn.onclick=(e)=>{e.stopPropagation();path=[...path,i];expanded=null;render();};
      div.onclick=()=>{path=[...path,i];expanded=null;render();};
    } else {
      btn.textContent="i";btn.style.fontSize="11px";
      btn.onclick=(e)=>{e.stopPropagation();expanded=expanded===key?null:key;render();};
      div.onclick=()=>{expanded=expanded===key?null:key;render();};
    }
    na.appendChild(btn);
    div.appendChild(nl);div.appendChild(nb);div.appendChild(na);
    nodesEl.appendChild(div);
    if(!hasChildren&&child.desc&&expanded===key){
      const dd=document.createElement("div");dd.className="dd";dd.textContent=child.desc;
      div.appendChild(dd);
    }
  });
}

function goBack(){
  if(searchQ){searchQ="";document.getElementById("src").value="";expanded=null;render();return;}
  if(path.length>0){path=path.slice(0,-1);expanded=null;render();}
}

render();
